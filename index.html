<!DOCTYPE html>
<html>
<head>
<title>My First Website</title>

<style>
body{
font-family: Arial;
margin:0;
background:#f4f4f4;
}

header{
background:#333;
color:white;
padding:20px;
text-align:center;
}

nav{
background:#555;
padding:10px;
text-align:center;
}

nav a{
color:white;
margin:15px;
text-decoration:none;
font-weight:bold;
}

nav a:hover{
color:yellow;
}

.container{
padding:40px;
text-align:center;
}

button{
background:#007BFF;
color:white;
border:none;
padding:10px 20px;
font-size:16px;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#0056b3;
}

footer{
background:#333;
color:white;
text-align:center;
padding:10px;
margin-top:40px;
}
</style>
</head>

<body>

<header>
<h1>Welcome to My Website</h1>
<p>This website is hosted for FREE using GitHub Pages</p>
</header>

<nav>
<a href="#">Home</a>
<a href="#">About</a>
<a href="#">Projects</a>
<a href="#">Contact</a>
</nav>

<div class="container">
<h2>Hello 👋</h2>
<p>This is my first website.</p>

<p>You can edit this text anytime on GitHub.</p>

<button onclick="showMessage()">Click Me</button>

<p id="message"></p>
</div>

<footer>
<p>© 2026 My Website</p>
</footer>

<script>
function showMessage(){
document.getElementById("message").innerHTML="Thanks for visiting my website!";
}
</script>

</body>
</html>
